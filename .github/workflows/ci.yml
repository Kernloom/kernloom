name: CI

on:
  pull_request:
  push:
    branches: [ master ]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Go fmt
        run: test -z "$(gofmt -l .)"

      - name: Go test
        run: go test ./...

      - name: Install clang/llvm for BPF
        run: |
          sudo apt-get update
          sudo apt-get install -y clang llvm make libbpf-dev linux-libc-dev

      - name: Build BPF object
        run: make -C shield/bpf

      - name: Build CLIs
        run: |
          mkdir -p bin
          go build -o bin/klshield ./shield/cmd/klshield
          go build -o bin/kliq     ./iq/cmd/kliq

      - name: Smoke build test
        run: bash tests/integration/scenarios/00_smoke_build.sh