  #         if-no-files-found: ignore

  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Install clang/llvm for BPF
        run: |
          sudo apt-get update
          sudo apt-get install -y clang llvm make libbpf-dev linux-libc-dev

      - name: Build BPF object
        run: make -C shield/bpf

      - name: Build + package binaries
        env:
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          mkdir -p dist

          VERSION="${TAG}"
          COMMIT="$(git rev-parse --short HEAD)"
          DATE="$(date -u +%Y-%m-%dT%H:%M:%SZ)"

          ldflags="-s -w \
            -X 'github.com/${{ github.repository }}/pkg/version.Version=${VERSION}' \
            -X 'github.com/${{ github.repository }}/pkg/version.Commit=${COMMIT}' \
            -X 'github.com/${{ github.repository }}/pkg/version.Date=${DATE}'"

          # Build matrix.
          # arm/v7 targets Synology DS218+ (Marvell Armada 385, ARMv7 Cortex-A9).
          #   kliq:    pure Go — runs natively on DSM 7.x with the `nas` profile.
          #   klshield: cross-compiles fine; XDP enforcement requires kernel XDP support
          #             (limited on DSM 7.x — check with `ip link show` for xdpgeneric/xdpdrv).
          #   BPF obj: architecture-independent BPF bytecode — same .o works on all arches.
          for arch in amd64 arm64 arm; do
            goarm_env=""
            suffix="${arch}"
            if [ "${arch}" = "arm" ]; then
              goarm_env="GOARM=7"
              suffix="arm_v7"  # Synology DS218+ / ARMv7
            fi

            # klshield
            env CGO_ENABLED=0 GOOS=linux GOARCH=${arch} ${goarm_env} \
              go build -trimpath -ldflags="${ldflags}" \
              -o "dist/klshield_linux_${suffix}" ./shield/cmd/klshield

            # kliq
            env CGO_ENABLED=0 GOOS=linux GOARCH=${arch} ${goarm_env} \
              go build -trimpath -ldflags="${ldflags}" \
              -o "dist/kliq_linux_${suffix}" ./iq/cmd/kliq

            # package: klshield bundle includes BPF obj (arch-independent bytecode)
            mkdir -p "dist/pkg_klshield_linux_${suffix}/bpf"
            cp "dist/klshield_linux_${suffix}" "dist/pkg_klshield_linux_${suffix}/klshield"
            cp "shield/bpf/out/xdp_kernloom_shield.bpf.o" "dist/pkg_klshield_linux_${suffix}/bpf/"
            tar -C "dist/pkg_klshield_linux_${suffix}" -czf "dist/klshield_${VERSION}_linux_${suffix}.tar.gz" .

            # package: kliq bundle
            mkdir -p "dist/pkg_kliq_linux_${suffix}"
            cp "dist/kliq_linux_${suffix}" "dist/pkg_kliq_linux_${suffix}/kliq"
            tar -C "dist/pkg_kliq_linux_${suffix}" -czf "dist/kliq_${VERSION}_linux_${suffix}.tar.gz" .
          done

          # checksums
          (cd dist && sha256sum *.tar.gz > SHA256SUMS.txt)

      - name: Create GitHub Release + upload assets
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/*.tar.gz
            dist/SHA256SUMS.txt