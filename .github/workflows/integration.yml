name: Integration

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "shield/**"
      - "iq/**"
      - "pkg/**"
      - "tests/integration/**"
      - ".github/workflows/integration.yml"
      - "Makefile"

permissions:
  contents: read

jobs:
  integration:
    # Requires a self-hosted runner with: sudo, ip netns, veth, bpffs, CAP_BPF.
    # Tag the runner with [self-hosted, linux, xdp] to enable this job.
    runs-on: [self-hosted, linux, xdp]
    timeout-minutes: 20
    env:
      KLT_ARTIFACT_DIR: /tmp/kernloom-integration-artifacts/${{ github.run_id }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Install dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y -q \
            clang llvm make libbpf-dev linux-libc-dev \
            bpftool iproute2 curl netcat-openbsd python3 jq

      - name: Build
        run: make build

      - name: Run integration tests
        run: sudo -E make integration

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: kernloom-integration-${{ github.run_id }}
          path: /tmp/kernloom-integration-artifacts/${{ github.run_id }}/**
          if-no-files-found: ignore
