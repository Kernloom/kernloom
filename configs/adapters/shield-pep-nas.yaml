# Shield PEP Adapter Manifest — NAS variant
#
# Higher rate limits for SMB/NFS file transfer bursts.
# Use with configs/policies/nas.yaml.

kind: AdapterManifest
adapter: shield-pep
version: "1"

capabilities:
  network.rate_limit_source:
    params:
      soft:
        rate_pps: 600
        burst:    1500
      hard:
        rate_pps: 150
        burst:    300

  network.block_source:
    params:
      cooldown: "30s"
