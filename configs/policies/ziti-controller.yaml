# LocalPolicyPack — Kernloom IQ
#
# Abstract, PEP-agnostic enforcement policy.
# Contains ONLY: autonomy gates, capability requirements, enforcement rules, exports.
# No signal thresholds, no FSM params, no graph config, no rate/burst values.
#
# What belongs where:
#   enforcement rules + autonomy  → this file (PolicyPack)
#   signal engine + FSM + graph   → configs/pdp/ziti-controller.yaml (PDPConfig)
#   rate/burst/cooldown           → configs/adapters/shield-pep.yaml (AdapterManifest)
#
# Usage:
#   sudo kliq \
#     --pdp-config=configs/pdp/ziti-controller.yaml \
#     --policy-file=configs/policies/ziti-controller.yaml \
#     --adapter-config=configs/adapters/shield-pep.yaml

apiVersion: kernloom.io/v1alpha1
kind: LocalPolicyPack
metadata:
  name: ziti-controller
  description: "Public OpenZiti controller / enrolment endpoint"
  labels:
    role: ziti-controller
    environment: production

spec:
  target_selector:
    match_labels:
      role: ziti-controller

  capabilities_required:
    - network.observe_flow
    - network.rate_limit_source
    - network.block_source

  autonomy:
    dry_run: false
    max_action: block
    allow_local_block: true

  rules:
    - name: soft-rate-limit
      when:
        fsm_level: soft
      then:
        action: rate_limit
        capability: network.rate_limit_source
        ttl: "60s"

    - name: hard-rate-limit
      when:
        fsm_level: hard
      then:
        action: rate_limit
        capability: network.rate_limit_source
        ttl: "10m"

    - name: block
      when:
        fsm_level: block
      then:
        action: block
        capability: network.block_source
        ttl: "30m"

    - name: graph-freeze-violation
      when:
        signal: graph.new_edge_after_freeze
      then:
        action: signal
        capability: signal.emit_local_risk
        ttl: "10m"

  exports:
    correlate:
      enabled: false
      endpoint: ""
    forge:
      enabled: false
      endpoint: ""
