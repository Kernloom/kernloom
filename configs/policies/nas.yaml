# LocalPolicyPack — Kernloom IQ
#
# NAS: Synology, QNAP, TrueNAS.
# Use with: --adapter-config=configs/adapters/shield-pep-nas.yaml

apiVersion: kernloom.io/v1alpha1
kind: LocalPolicyPack
metadata:
  name: nas
  description: "NAS (Synology/QNAP/TrueNAS). Burst-tolerant for file transfers, strict on SYN/scan."
  labels:
    role: nas

spec:
  target_selector:
    match_labels:
      role: nas

  capabilities_required:
    - network.observe_flow
    - network.rate_limit_source
    - network.block_source

  autonomy:
    dry_run: false
    max_action: block
    allow_local_block: true

  heuristics:
    pps_trigger:  1500.0
    syn_trigger:  30.0
    scan_trigger: 8.0
    weights:
      pps:  0.30
      syn:  0.35
      scan: 0.35
      cap:  3.0
    progressive_enforcement:
      soft_at:       2
      hard_at:       5
      block_at:      14
      up_need:       2
      down_need:     8
      block_min_sev: 2.5
      block_min_dur: "30s"
      min_hold_soft: "1m"
      min_hold_hard: "5m"
    non_compliance:
      at:    10
      drop:  2.0
      sev:   1.8
      reset: 0.30

  rules:
    - name: soft-rate-limit
      when:
        fsm_level: soft
      then:
        action: rate_limit
        capability: network.rate_limit_source
        ttl: "2m"

    - name: hard-rate-limit
      when:
        fsm_level: hard
      then:
        action: rate_limit
        capability: network.rate_limit_source
        ttl: "15m"

    - name: block
      when:
        fsm_level: block
      then:
        action: block
        capability: network.block_source
        ttl: "24h"

    - name: graph-freeze-violation
      when:
        signal: graph.new_edge_after_freeze
      then:
        action: signal
        capability: signal.emit_local_risk
        ttl: "10m"

  graph:
    enabled: false
    mode: learn
    store: /var/lib/kernloom/iq/graph.db
    promotion:
      min_seen_count: 5
      min_windows:    3
      min_age:        "10m"
      expire_ttl:     "720h"
    freeze:
      action:                signal
      ttl:                   "10m"
      max_action:            rate_limit
      allow_block:           false
      min_severity_for_block: 70
    exclude:
      broadcast: true
      loopback:  true

  exports:
    correlate:
      enabled: false
      endpoint: ""
    forge:
      enabled: false
      endpoint: ""
