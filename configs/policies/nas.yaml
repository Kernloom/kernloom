# LocalPolicyPack — NAS

apiVersion: kernloom.io/v1alpha1
kind: LocalPolicyPack
metadata:
  name: nas
  description: "NAS (Synology/QNAP/TrueNAS). Long block TTL."
  labels:
    role: nas

spec:
  target_selector:
    match_labels:
      role: nas

  capabilities_required:
    - network.observe_flow
    - network.rate_limit_source
    - network.block_source

  autonomy:
    dry_run: false
    max_action: block
    allow_local_block: true

  rules:
    - name: soft-rate-limit
      when:
        fsm_level: soft
      then:
        action: rate_limit
        capability: network.rate_limit_source
        ttl: "2m"

    - name: hard-rate-limit
      when:
        fsm_level: hard
      then:
        action: rate_limit
        capability: network.rate_limit_source
        ttl: "15m"

    - name: block
      when:
        fsm_level: block
      then:
        action: block
        capability: network.block_source
        ttl: "24h"

    - name: graph-freeze-violation
      when:
        signal: graph.new_edge_after_freeze
      then:
        action: signal
        capability: signal.emit_local_risk
        ttl: "10m"

  exports:
    correlate:
      enabled: false
      endpoint: ""
    forge:
      enabled: false
      endpoint: ""
