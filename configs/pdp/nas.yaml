# PDPConfig — NAS / Storage Node (Production)
#
# BPS autotune active — ensure backup schedules ran during bootstrap
# so the BPS floor reflects real backup throughput.
# Use after bootstrap completes.
#
# Adapter note (NAS / older kernel):
#   NAS systems (Synology, QNAP, TrueNAS) often run older kernels without
#   XDP/eBPF support. On these systems use netfilter instead of klshield:
#
#     sudo kliq --adapter=netfilter --pdp-config=configs/pdp/nas.yaml
#
#   When both klshield and netfilter are available (modern kernel + XDP):
#
#     sudo kliq --adapter=klshield,netfilter --pdp-config=configs/pdp/nas.yaml
#
#   The netfilter adapter uses iptables-legacy (Synology) or nftables
#   (modern Linux) as backend, selected automatically at startup.
#   Conntrack is used for graph edge learning when available.
#
# # Uncomment to pin to iptables-legacy on Synology-like systems:
# # (set in RuntimeBundle pdp_config.content for managed mode)
# # netfilter:
# #   backend: iptables-legacy
# #   observation:
# #     conntrack_snapshot: true
# #     conntrack_poll_interval: 10s
# #   safety:
# #     management_allowlist:
# #       - 192.168.1.0/24   # always allow management subnet

apiVersion: kernloom.io/v1alpha1
kind: PDPConfig
metadata:
  name: nas
  description: "NAS production — BPS-aware, burst-tolerant, long block TTL"

spec:

  signal_engine:
    pps_trigger:  1500.0
    syn_trigger:   30.0
    scan_trigger:   8.0
    bps_trigger:   80000000.0   # 80 MB/s; autotune learns real backup throughput
    weights:
      pps:  0.25
      syn:  0.30
      scan: 0.25
      bps:  0.20
      cap:  3.0

  progressive_enforcement:
    soft_at:       2
    hard_at:       5
    block_at:      14
    up_need:       2
    down_need:     8
    block_min_sev: 2.5
    block_min_dur: "30s"
    min_hold_soft: "1m"
    min_hold_hard: "5m"

  non_compliance:
    at:    10
    drop:  2.0
    sev:   1.8
    reset: 0.30

  graph:
    enabled: true
    mode:    frozen-observe
    store:   /var/lib/kernloom/iq/kliq.db
    promotion:
      min_seen_count: 5
      min_windows:    3
      min_age:        "10m"
      expire_ttl:     "720h"
    freeze:
      max_action:             rate_limit
      allow_block:            false
      min_severity_for_block: 70
    exclude:
      broadcast: true
      loopback:  true

  baseline:
    min_observations:    50
    alpha:               0.02
    alpha_bootstrap:     0.08
    deviation_threshold: 7.0
    min_update_pps:      5.0
    peak_tolerance:      2.0
    peak_decay_half_life: "672h"  # 28 days — backup traffic is weekly
    min_obs_time_based:  3
    min_age_time_based:  "168h"   # 7 days for weekly-job edges

  autotune:
    enabled: true
    min_samples: 500
    floors:
      pps:  200.0
      syn:   30.0
      scan:   8.0
      bps:   10000000.0           # 10 MB/s floor
    bootstrap:
      window:     "336h"
      k_start:    4.5
      k_final:    3.5
      phase1_end: "48h"
      phase2_end: "120h"
      phase1:
        interval: "1h"
        max_up:   0.12
        max_down: 0.02
        alpha:    0.10
      phase2:
        interval: "6h"
        max_up:   0.08
        max_down: 0.03
        alpha:    0.15
      phase3:
        interval: "24h"
        max_up:   0.05
        max_down: 0.05
        alpha:    0.20
      steady:
        interval: "168h"          # weekly — matches backup schedule
        max_up:   0.05
        max_down: 0.05
        alpha:    0.20

  adapters:
    shield_pep:
      soft_rate_factor: 0.60
      hard_rate_factor: 0.20
      soft_rate_pps: 600
      soft_burst:    1500
      hard_rate_pps: 150
      hard_burst:    300
      cooldown:      "30s"
