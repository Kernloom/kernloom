# PDPConfig — NAS / Storage Node (Production)
#
# Use after NAS bootstrap completes. Expects learned state.json.
# BPS autotune is enabled — ensure backup schedules ran during bootstrap
# so the BPS floor reflects real backup throughput.

apiVersion: kernloom.io/v1alpha1
kind: PDPConfig
metadata:
  name: nas
  description: "NAS production — BPS-aware, burst-tolerant, expects learned state"

spec:

  signal_engine:
    pps_trigger:  0.0        # defer to state.json
    syn_trigger:  0.0
    scan_trigger: 0.0
    bps_trigger:  0.0        # defer to state.json (learned from backup traffic)
    weights:
      pps:  0.25
      syn:  0.30
      scan: 0.25
      bps:  0.20
      cap:  3.0

  progressive_enforcement:
    soft_at:       2
    hard_at:       5
    block_at:      14
    up_need:       2
    down_need:     8
    block_min_sev: 2.5
    block_min_dur: "30s"
    min_hold_soft: "1m"
    min_hold_hard: "5m"

  non_compliance:
    at:    10
    drop:  2.0
    sev:   1.8
    reset: 0.30

  graph:
    enabled: true
    mode:    frozen-observe
    store:   /var/lib/kernloom/iq/kliq.db
    promotion:
      min_seen_count: 5
      min_windows:    3
      min_age:        "10m"
      expire_ttl:     "720h"
    freeze:
      max_action:             rate_limit
      allow_block:            false
      min_severity_for_block: 70
    exclude:
      broadcast: true
      loopback:  true

  baseline:
    min_observations:    50
    alpha:               0.02
    alpha_bootstrap:     0.08
    deviation_threshold: 7.0
    min_update_pps:      5.0
    peak_tolerance:      2.0
    peak_decay_half_life: "672h"

  autotune:
    enabled: true
    min_samples: 500
    floors:
      pps:  200.0
      syn:  30.0
      scan: 8.0
      bps:  10000000
    bootstrap:
      steady:
        interval: "168h"
        max_up:   0.05
        max_down: 0.05
        alpha:    0.20

  adapters:
    shield_pep:
      soft_rate_pps: 600
      soft_burst:    1500
      hard_rate_pps: 150
      hard_burst:    300
      cooldown:      "30s"
