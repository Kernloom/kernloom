# PDPConfig — API Server (Production)

apiVersion: kernloom.io/v1alpha1
kind: PDPConfig
metadata:
  name: api-server
  description: "API server production — high SYN tolerance, expects learned state"

spec:

  signal_engine:
    pps_trigger:  0.0
    syn_trigger:  0.0
    scan_trigger: 0.0
    weights:
      pps:  0.30
      syn:  0.35
      scan: 0.35
      cap:  3.0

  progressive_enforcement:
    soft_at:       1
    hard_at:       4
    block_at:      10
    up_need:       2
    down_need:     6
    block_min_sev: 2.3
    block_min_dur: "25s"
    min_hold_soft: "20s"
    min_hold_hard: "1m"

  non_compliance:
    at:    10
    drop:  2.0
    sev:   1.8
    reset: 0.25

  graph:
    enabled: true
    mode:    frozen-observe
    store:   /var/lib/kernloom/iq/kliq.db
    promotion:
      min_seen_count: 5
      min_windows:    3
      min_age:        "10m"
      expire_ttl:     "720h"
    freeze:
      max_action:             rate_limit
      allow_block:            false
      min_severity_for_block: 70
    exclude:
      broadcast: true
      loopback:  true

  baseline:
    min_observations:    30
    alpha:               0.02
    alpha_bootstrap:     0.10
    deviation_threshold: 4.5
    min_update_pps:      5.0
    peak_tolerance:      1.5
    peak_decay_half_life: "336h"

  autotune:
    enabled: true
    min_samples: 500
    floors:
      pps:  1000.0
      syn:  200.0
      scan: 10.0
    bootstrap:
      steady:
        interval: "84h"
        max_up:   0.05
        max_down: 0.05
        alpha:    0.20

  adapters:
    shield_pep:
      soft_rate_pps: 500
      soft_burst:    1000
      hard_rate_pps: 100
      hard_burst:    200
      cooldown:      "5s"
