# PDPConfig — NAS / Storage Node (Bootstrap / Safe Start)
#
# Very tolerant. Let backup jobs run during this phase so BPS baseline
# is learned before switching to nas.yaml.

apiVersion: kernloom.io/v1alpha1
kind: PDPConfig
metadata:
  name: nas-bootstrap
  description: "NAS bootstrap — permissive, BPS-aware, no blocking"

spec:

  signal_engine:
    pps_trigger:  4000.0
    syn_trigger:   100.0
    scan_trigger:   30.0
    bps_trigger:   200000000.0
    weights:
      pps:  0.25
      syn:  0.30
      scan: 0.25
      bps:  0.20
      cap:  3.0

  progressive_enforcement:
    soft_at:       3
    hard_at:       7
    block_at:      999
    up_need:       3
    down_need:     10
    block_min_sev: 0.0
    block_min_dur: "0s"
    min_hold_soft: "2m"
    min_hold_hard: "10m"

  non_compliance:
    at:    999
    drop:  999.0
    sev:   999.0
    reset: 0.30

  graph:
    enabled: true
    mode:    learn
    store:   /var/lib/kernloom/iq/kliq.db
    promotion:
      min_seen_count: 3
      min_windows:    2
      min_age:        "10m"
      expire_ttl:     "720h"
    freeze:
      max_action:             observe
      allow_block:            false
      min_severity_for_block: 999
    exclude:
      broadcast: true
      loopback:  true

  baseline:
    min_observations:    30
    alpha:               0.10
    alpha_bootstrap:     0.15
    deviation_threshold: 10.0
    min_update_pps:      5.0
    peak_tolerance:      4.0
    peak_decay_half_life: "672h"
    min_obs_time_based:  3
    min_age_time_based:  "168h"

  autotune:
    enabled: true
    min_samples: 200
    floors:
      pps:  500.0
      syn:   50.0
      scan:  15.0
      bps:   5000000.0
    bootstrap:
      window:     "336h"
      k_start:    6.0
      k_final:    4.5
      phase1_end: "48h"
      phase2_end: "120h"
      phase1:
        interval: "1h"
        max_up:   0.20
        max_down: 0.01
        alpha:    0.08
      phase2:
        interval: "6h"
        max_up:   0.12
        max_down: 0.02
        alpha:    0.10
      phase3:
        interval: "24h"
        max_up:   0.07
        max_down: 0.03
        alpha:    0.15
      steady:
        interval: "168h"
        max_up:   0.05
        max_down: 0.05
        alpha:    0.20

  adapters:
    shield_pep:
      soft_rate_factor: 0.80
      hard_rate_factor: 0.40
      soft_rate_pps: 1500
      soft_burst:    4000
      hard_rate_pps: 500
      hard_burst:    1000
      cooldown:      "60s"
