# PDPConfig — Web Server (Bootstrap, 14 days)
# Feature profile:  minimum dos-light
#                   recommended iq-learning
#
# Start command:
#   sudo kliq --pdp-config=<this-file> --dry-run=true --whitelist-learn=true
#
#
# Covers: Nginx, Apache, Caddy, and similar HTTP/HTTPS servers.
# Balances between SYN-flood sensitivity and tolerance for legitimate bursts
# (browser pre-connect, crawlers, CDN healthchecks).

apiVersion: kernloom.io/v1alpha1
kind: PDPConfig
metadata:
  name: web-server-bootstrap
  description: "Web server bootstrap — SYN-sensitive, crawler-tolerant, 14-day learning"

spec:

  signal_engine:
    pps_trigger:  2000.0
    syn_trigger:  500.0     # web servers see many SYNs; higher tolerance than API
    scan_trigger: 30.0
    weights:
      pps:  0.30
      syn:  0.45            # SYN-flood is the primary threat for web servers
      scan: 0.25
      cap:  3.0

  progressive_enforcement:
    soft_at:       2
    hard_at:       5
    block_at:      14
    up_need:       2
    down_need:     6
    block_min_sev: 2.2
    block_min_dur: "20s"
    min_hold_soft: "20s"
    min_hold_hard: "1m"

  non_compliance:
    at:    10
    drop:  3.0
    sev:   1.8
    reset: 0.25

  graph:
    enabled: false
    mode:    learn
    store:   /var/lib/kernloom/iq/kliq.db
    promotion:
      min_seen_count: 5
      min_windows:    3
      min_age:        "10m"
      expire_ttl:     "720h"
    freeze:
      max_action:             rate_limit
      allow_block:            false
      min_severity_for_block: 70
    exclude:
      broadcast: true
      loopback:  true

  baseline:
    min_observations:    30
    alpha:               0.02
    alpha_bootstrap:     0.10
    deviation_threshold: 5.0
    min_update_pps:      5.0
    peak_tolerance:      1.5
    peak_decay_half_life: "336h"

  autotune:
    enabled: true
    min_samples: 500
    floors:
      pps:  500.0
      syn:  100.0
      scan: 15.0
    bootstrap:
      window:     "336h"
      k_start:    4.0
      k_final:    3.5
      phase1_end: "48h"
      phase2_end: "120h"
      phase1:
        interval: "1h"
        max_up:   0.15
        max_down: 0.10
        alpha:    0.10
      phase2:
        interval: "6h"
        max_up:   0.10
        max_down: 0.08
        alpha:    0.15
      phase3:
        interval: "24h"
        max_up:   0.05
        max_down: 0.05
        alpha:    0.20
      steady:
        interval: "84h"
        max_up:   0.05
        max_down: 0.05
        alpha:    0.20

  adapters:
    shield_pep:
      soft_rate_pps: 200
      soft_burst:    500
      hard_rate_pps: 50
      hard_burst:    100
      cooldown:      "5s"
