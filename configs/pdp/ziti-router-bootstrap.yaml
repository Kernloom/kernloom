# PDPConfig — OpenZiti Router / Edge Router (Bootstrap / Safe Start)

apiVersion: kernloom.io/v1alpha1
kind: PDPConfig
metadata:
  name: ziti-router-bootstrap
  description: "OpenZiti router — bootstrap phase, high triggers, no blocking"

spec:

  signal_engine:
    pps_trigger:  25000.0
    syn_trigger:    600.0
    scan_trigger:   120.0
    weights:
      pps:  0.60
      syn:  0.25
      scan: 0.15
      cap:  3.0

  progressive_enforcement:
    soft_at:       3
    hard_at:       8
    block_at:      999
    up_need:       3
    down_need:     10
    block_min_sev: 0.0
    block_min_dur: "0s"
    min_hold_soft: "30s"
    min_hold_hard: "1m"

  non_compliance:
    at:    40
    drop:  50.0
    sev:   2.5
    reset: 0.30

  graph:
    enabled: true
    mode:    learn
    store:   /var/lib/kernloom/iq/kliq.db
    promotion:
      min_seen_count: 3
      min_windows:    2
      min_age:        "5m"
      expire_ttl:     "720h"
    freeze:
      max_action:             observe
      allow_block:            false
      min_severity_for_block: 999
    exclude:
      broadcast: true
      loopback:  true

  baseline:
    min_observations:    20
    alpha:               0.10
    alpha_bootstrap:     0.15
    deviation_threshold: 10.0
    min_update_pps:      10.0
    peak_tolerance:      4.0
    peak_decay_half_life: "336h"

  autotune:
    enabled: true
    min_samples: 500
    floors:
      pps:  5000.0
      syn:   200.0
      scan:   40.0
    bootstrap:
      window:     "336h"
      k_start:    6.0
      k_final:    4.0
      phase1_end: "48h"
      phase2_end: "120h"
      phase1:
        interval: "1h"
        max_up:   0.20
        max_down: 0.01
        alpha:    0.08
      phase2:
        interval: "6h"
        max_up:   0.12
        max_down: 0.02
        alpha:    0.10
      phase3:
        interval: "24h"
        max_up:   0.07
        max_down: 0.03
        alpha:    0.15
      steady:
        interval: "84h"
        max_up:   0.05
        max_down: 0.05
        alpha:    0.20

  adapters:
    shield_pep:
      soft_rate_factor: 0.80
      hard_rate_factor: 0.40
      soft_rate_pps: 10000
      soft_burst:    25000
      hard_rate_pps: 3000
      hard_burst:    8000
      cooldown:      "5s"
