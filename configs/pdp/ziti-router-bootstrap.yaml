# PDPConfig — OpenZiti Router / Edge Router (Bootstrap, 14 days)
# Feature profile:  minimum dos-light
#                   recommended iq-learning
#
# Start command:
#   sudo kliq --pdp-config=<this-file> --dry-run=true --whitelist-learn=true
#
#
# Ziti routers (edge routers, transit links, NAT gateways) handle significantly
# higher PPS than controllers: many concurrent tunnels, sustained throughput,
# high SYN rates during connection setup bursts.
#
# The cold-start triggers are deliberately high so legitimate router traffic
# does not trigger false enforcement during learning.

apiVersion: kernloom.io/v1alpha1
kind: PDPConfig
metadata:
  name: ziti-router-bootstrap
  description: "OpenZiti router bootstrap — high-throughput, 14-day learning window"

spec:

  signal_engine:
    pps_trigger:  5000.0    # routers forward many tunnelled packets
    syn_trigger:  2000.0    # high SYN rate during client connect bursts
    scan_trigger: 50.0
    weights:
      pps:  0.40
      syn:  0.35
      scan: 0.25
      cap:  3.0

  progressive_enforcement:
    soft_at:       3
    hard_at:       8
    block_at:      20
    up_need:       3
    down_need:     10
    block_min_sev: 2.8
    block_min_dur: "60s"
    min_hold_soft: "1m"
    min_hold_hard: "5m"

  non_compliance:
    at:    15
    drop:  5.0
    sev:   2.0
    reset: 0.20

  graph:
    enabled: false
    mode:    learn
    store:   /var/lib/kernloom/iq/kliq.db
    promotion:
      min_seen_count: 5
      min_windows:    3
      min_age:        "10m"
      expire_ttl:     "720h"
    freeze:
      max_action:             rate_limit
      allow_block:            false
      min_severity_for_block: 75
    exclude:
      broadcast: true
      loopback:  true

  baseline:
    min_observations:    30
    alpha:               0.02
    alpha_bootstrap:     0.10
    deviation_threshold: 6.0    # routers are bursty; be less sensitive
    min_update_pps:      10.0   # high idle-vs-burst gap on router links
    peak_tolerance:      2.0    # 100% above peak before alerting (router bursts are normal)
    peak_decay_half_life: "336h"

  autotune:
    enabled: true
    min_samples: 500
    floors:
      pps:  1000.0
      syn:  200.0
      scan: 20.0
    bootstrap:
      window:     "336h"
      k_start:    4.0
      k_final:    3.5
      phase1_end: "48h"
      phase2_end: "120h"
      phase1:
        interval: "1h"
        max_up:   0.15     # routers can have sudden traffic spikes — allow fast upscale
        max_down: 0.10
        alpha:    0.10
      phase2:
        interval: "6h"
        max_up:   0.10
        max_down: 0.08
        alpha:    0.15
      phase3:
        interval: "24h"
        max_up:   0.05
        max_down: 0.05
        alpha:    0.20
      steady:
        interval: "84h"
        max_up:   0.05
        max_down: 0.05
        alpha:    0.20

  adapters:
    shield_pep:
      soft_rate_pps: 2000   # soft RL still allows forwarding most tunnel traffic
      soft_burst:    4000
      hard_rate_pps: 500
      hard_burst:    1000
      cooldown:      "10s"
