# PDPConfig — OpenZiti Router / Edge Router (Production)
# Feature profile:  minimum dos-light
#                   recommended iq-learning
#
# Start command:
#   sudo kliq --pdp-config=<this-file> --dry-run=false
#
#
# Use after completing the router bootstrap. Expects learned trigger values
# in state.json. Graph should be in frozen-observe or frozen-enforce mode.

apiVersion: kernloom.io/v1alpha1
kind: PDPConfig
metadata:
  name: ziti-router
  description: "OpenZiti router — production, high-throughput, expects learned state"

spec:

  signal_engine:
    pps_trigger:  0.0       # defer to state.json (learned during bootstrap)
    syn_trigger:  0.0
    scan_trigger: 0.0
    weights:
      pps:  0.40
      syn:  0.35
      scan: 0.25
      cap:  3.0

  progressive_enforcement:
    soft_at:       2
    hard_at:       5
    block_at:      14
    up_need:       2
    down_need:     8
    block_min_sev: 2.5
    block_min_dur: "30s"
    min_hold_soft: "30s"
    min_hold_hard: "3m"

  non_compliance:
    at:    12
    drop:  5.0
    sev:   2.0
    reset: 0.20

  graph:
    enabled: true
    mode:    frozen-observe
    store:   /var/lib/kernloom/iq/kliq.db
    promotion:
      min_seen_count: 5
      min_windows:    3
      min_age:        "10m"
      expire_ttl:     "720h"
    freeze:
      max_action:             rate_limit
      allow_block:            false
      min_severity_for_block: 75
    exclude:
      broadcast: true
      loopback:  true

  baseline:
    min_observations:    30
    alpha:               0.02
    alpha_bootstrap:     0.10
    deviation_threshold: 6.0
    min_update_pps:      10.0
    peak_tolerance:      2.0
    peak_decay_half_life: "336h"

  autotune:
    enabled: true
    min_samples: 500
    floors:
      pps:  1000.0
      syn:  200.0
      scan: 20.0
    bootstrap:
      steady:
        interval: "84h"
        max_up:   0.05
        max_down: 0.05
        alpha:    0.20

  adapters:
    shield_pep:
      soft_rate_pps: 2000
      soft_burst:    4000
      hard_rate_pps: 500
      hard_burst:    1000
      cooldown:      "10s"
