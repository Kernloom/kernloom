# PDPConfig — Database Server (Production)
# Feature profile:  minimum graph-learning
#                   recommended graph-learning
#
# Start command:
#   sudo kliq --pdp-config=<this-file> --graph --graph-mode=frozen-observe --dry-run=false
#

apiVersion: kernloom.io/v1alpha1
kind: PDPConfig
metadata:
  name: database
  description: "Database production — low PPS, BPS-aware, expects learned state"

spec:

  signal_engine:
    pps_trigger:  0.0
    syn_trigger:  0.0
    scan_trigger: 0.0
    bps_trigger:  0.0
    weights:
      pps:  0.20
      syn:  0.30
      scan: 0.30
      bps:  0.20
      cap:  3.0

  progressive_enforcement:
    soft_at:       1
    hard_at:       3
    block_at:      10
    up_need:       2
    down_need:     8
    block_min_sev: 2.8
    block_min_dur: "60s"
    min_hold_soft: "30s"
    min_hold_hard: "3m"

  non_compliance:
    at:    8
    drop:  1.0
    sev:   1.5
    reset: 0.30

  graph:
    enabled: true
    mode:    frozen-observe
    store:   /var/lib/kernloom/iq/kliq.db
    promotion:
      min_seen_count: 5
      min_windows:    3
      min_age:        "10m"
      expire_ttl:     "720h"
    freeze:
      max_action:             rate_limit
      allow_block:            false
      min_severity_for_block: 70
    exclude:
      broadcast: true
      loopback:  true

  baseline:
    min_observations:    30
    alpha:               0.02
    alpha_bootstrap:     0.10
    deviation_threshold: 4.0
    min_update_pps:      2.0
    peak_tolerance:      1.5
    peak_decay_half_life: "336h"

  autotune:
    enabled: true
    min_samples: 500
    floors:
      pps:  100.0
      syn:  20.0
      scan: 3.0
      bps:  10000000
    bootstrap:
      steady:
        interval: "84h"
        max_up:   0.05
        max_down: 0.05
        alpha:    0.20

  adapters:
    shield_pep:
      soft_rate_pps: 100
      soft_burst:    200
      hard_rate_pps: 30
      hard_burst:    60
      cooldown:      "15s"
