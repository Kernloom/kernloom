# PDPConfig — OpenZiti Controller (Production)
#
# Use AFTER completing the bootstrap phase:
#   1. kliq status shows "steady" or bootstrap-3 with stable triggers
#   2. kliq graph freeze has been run
#   3. state.json contains learned trigger values
#
# The trigger values here are cold-start fallbacks only.
# kliq prioritises: explicit CLI flags > state.json > this file.
#
# Usage:
#   sudo kliq \
#     --pdp-config=configs/pdp/ziti-controller.yaml \
#     --graph --graph-mode=frozen-observe

apiVersion: kernloom.io/v1alpha1
kind: PDPConfig
metadata:
  name: ziti-controller
  description: "OpenZiti controller — production, expects learned state from bootstrap"

spec:

  signal_engine:
    # Set to 0 to defer entirely to the autotune state file (recommended after bootstrap).
    # These values are used only if state.json is absent or expired.
    pps_trigger:  80.0
    syn_trigger:  20.0
    scan_trigger: 5.0
    weights:
      pps:  0.35
      syn:  0.40
      scan: 0.25
      cap:  3.0

  progressive_enforcement:
    soft_at:       1
    hard_at:       3
    block_at:      9
    up_need:       2
    down_need:     6
    block_min_sev: 2.0
    block_min_dur: "15s"
    min_hold_soft: "15s"
    min_hold_hard: "30s"

  non_compliance:
    at:    8
    drop:  1.0
    sev:   1.5
    reset: 0.30

  graph:
    enabled: true
    mode:    frozen-observe   # switch to frozen-enforce when confident
    store:   /var/lib/kernloom/iq/kliq.db
    promotion:
      min_seen_count: 5
      min_windows:    3
      min_age:        "10m"
      expire_ttl:     "720h"
    freeze:
      max_action:             rate_limit
      allow_block:            false
      min_severity_for_block: 70
    exclude:
      broadcast: true
      loopback:  true

  baseline:
    min_observations:    30
    alpha:               0.02
    alpha_bootstrap:     0.10
    deviation_threshold: 5.0
    min_update_pps:      3.0
    peak_tolerance:      1.5
    peak_decay_half_life: "336h"

  autotune:
    enabled: true
    min_samples: 500
    floors:
      pps:  80.0
      syn:  20.0
      scan: 5.0
    bootstrap:
      steady:
        interval: "84h"
        max_up:   0.05
        max_down: 0.05
        alpha:    0.20

  adapters:
    shield_pep:
      soft_rate_pps: 20
      soft_burst:    40
      hard_rate_pps: 5
      hard_burst:    10
      cooldown:      "5s"
