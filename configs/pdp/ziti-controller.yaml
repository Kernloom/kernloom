# PDPConfig — OpenZiti Controller (Production)
#
# Use after bootstrap completes (autotune state.json contains learned triggers).
# Cold-start trigger values below are overridden by autotune state on startup.
#
# Usage (standalone):
#   sudo kliq --pdp-config=configs/pdp/ziti-controller.yaml
#
# In managed mode this file is for reference only — parameters come from the bundle.

apiVersion: kernloom.io/v1alpha1
kind: PDPConfig
metadata:
  name: ziti-controller
  description: "OpenZiti controller — public enrolment/API surface, SYN-sensitive"

spec:

  signal_engine:
    pps_trigger:  80.0          # cold-start; autotune learns real value
    syn_trigger:  20.0          # SYN-sensitive: enrolment endpoint is a target
    scan_trigger:  5.0
    weights:
      pps:  0.35
      syn:  0.40
      scan: 0.25
      cap:  3.0

  progressive_enforcement:
    soft_at:       1
    hard_at:       3
    block_at:      9
    up_need:       2
    down_need:     6
    block_min_sev: 2.0
    block_min_dur: "15s"
    min_hold_soft: "15s"
    min_hold_hard: "30s"

  non_compliance:
    at:    8
    drop:  1.0
    sev:   1.5
    reset: 0.30

  graph:
    enabled: true
    mode:    learn              # change to frozen-observe after kliq graph freeze
    store:   /var/lib/kernloom/iq/kliq.db
    promotion:
      min_seen_count: 5
      min_windows:    3
      min_age:        "10m"
      expire_ttl:     "720h"
    freeze:
      max_action:             rate_limit
      allow_block:            false
      min_severity_for_block: 70
    exclude:
      broadcast: true
      loopback:  true

  baseline:
    min_observations:    30
    alpha:               0.02
    alpha_bootstrap:     0.10
    deviation_threshold: 5.0
    min_update_pps:      1.0
    peak_tolerance:      1.5
    peak_decay_half_life: "336h"  # 14 days
    min_obs_time_based:  5
    min_age_time_based:  "168h"

  autotune:
    enabled: true
    min_samples: 500
    floors:
      pps:  80.0
      syn:  20.0
      scan:  5.0
    bootstrap:
      window:     "336h"        # 14 days
      k_start:    4.0
      k_final:    3.5
      phase1_end: "48h"
      phase2_end: "120h"
      phase1:
        interval: "1h"
        max_up:   0.10
        max_down: 0.02
        alpha:    0.10
      phase2:
        interval: "6h"
        max_up:   0.07
        max_down: 0.03
        alpha:    0.15
      phase3:
        interval: "24h"
        max_up:   0.05
        max_down: 0.05
        alpha:    0.20
      steady:
        interval: "84h"
        max_up:   0.05
        max_down: 0.05
        alpha:    0.20

  adapters:
    shield_pep:
      # Adaptive: effective rate = trig_pps × factor (tracks autotune automatically).
      soft_rate_factor: 0.50    # 50% of learned trig_pps
      hard_rate_factor: 0.10    # 10% of learned trig_pps
      # Fallback static values used when factor is 0:
      soft_rate_pps: 20
      soft_burst:    40
      hard_rate_pps:  5
      hard_burst:    10
      cooldown:      "5s"
