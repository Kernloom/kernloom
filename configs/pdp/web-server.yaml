# PDPConfig — Web Server (Production)

apiVersion: kernloom.io/v1alpha1
kind: PDPConfig
metadata:
  name: web-server
  description: "Public web server — balanced PPS+SYN, moderate thresholds"

spec:

  signal_engine:
    pps_trigger:  1200.0
    syn_trigger:   250.0
    scan_trigger:   20.0
    weights:
      pps:  0.55
      syn:  0.30
      scan: 0.15
      cap:  3.0

  progressive_enforcement:
    soft_at:       2
    hard_at:       5
    block_at:      12
    up_need:       2
    down_need:     8
    block_min_sev: 2.8
    block_min_dur: "30s"
    min_hold_soft: "20s"
    min_hold_hard: "45s"

  non_compliance:
    at:    15
    drop:  10.0
    sev:   2.0
    reset: 0.30

  graph:
    enabled: true
    mode:    learn
    store:   /var/lib/kernloom/iq/kliq.db
    promotion:
      min_seen_count: 5
      min_windows:    3
      min_age:        "10m"
      expire_ttl:     "720h"
    freeze:
      max_action:             rate_limit
      allow_block:            false
      min_severity_for_block: 70
    exclude:
      broadcast: true
      loopback:  true

  baseline:
    min_observations:    30
    alpha:               0.02
    alpha_bootstrap:     0.10
    deviation_threshold: 5.0
    min_update_pps:      5.0
    peak_tolerance:      1.5
    peak_decay_half_life: "336h"

  autotune:
    enabled: true
    min_samples: 500
    floors:
      pps:  300.0
      syn:   60.0
      scan:  10.0
    bootstrap:
      window:     "336h"
      k_start:    4.0
      k_final:    3.5
      phase1_end: "48h"
      phase2_end: "120h"
      phase1:
        interval: "1h"
        max_up:   0.10
        max_down: 0.02
        alpha:    0.10
      phase2:
        interval: "6h"
        max_up:   0.07
        max_down: 0.03
        alpha:    0.15
      phase3:
        interval: "24h"
        max_up:   0.05
        max_down: 0.05
        alpha:    0.20
      steady:
        interval: "84h"
        max_up:   0.05
        max_down: 0.05
        alpha:    0.20

  adapters:
    shield_pep:
      soft_rate_factor: 0.50
      hard_rate_factor: 0.15
      soft_rate_pps: 400
      soft_burst:    1000
      hard_rate_pps: 100
      hard_burst:    250
      cooldown:      "5s"
