# PDPConfig — Identity Provider (Bootstrap / Safe Start)

apiVersion: kernloom.io/v1alpha1
kind: PDPConfig
metadata:
  name: idp-bootstrap
  description: "Identity provider — bootstrap phase, tolerant, no blocking"

spec:

  signal_engine:
    pps_trigger:  2000.0
    syn_trigger:  1000.0
    scan_trigger:   80.0
    weights:
      pps:  0.30
      syn:  0.55
      scan: 0.15
      cap:  3.0

  progressive_enforcement:
    soft_at:       2
    hard_at:       5
    block_at:      999
    up_need:       3
    down_need:     10
    block_min_sev: 0.0
    block_min_dur: "0s"
    min_hold_soft: "1m"
    min_hold_hard: "5m"

  non_compliance:
    at:    999
    drop:  999.0
    sev:   999.0
    reset: 0.30

  graph:
    enabled: true
    mode:    learn
    store:   /var/lib/kernloom/iq/kliq.db
    promotion:
      min_seen_count: 3
      min_windows:    2
      min_age:        "5m"
      expire_ttl:     "720h"
    freeze:
      max_action:             observe
      allow_block:            false
      min_severity_for_block: 999
    exclude:
      broadcast: true
      loopback:  true

  baseline:
    min_observations:    20
    alpha:               0.10
    alpha_bootstrap:     0.15
    deviation_threshold: 8.0
    min_update_pps:      2.0
    peak_tolerance:      3.0
    peak_decay_half_life: "336h"

  autotune:
    enabled: true
    min_samples: 200
    floors:
      pps:  200.0
      syn:  100.0
      scan:  15.0
    bootstrap:
      window:     "336h"
      k_start:    5.0
      k_final:    4.0
      phase1_end: "48h"
      phase2_end: "120h"
      phase1:
        interval: "1h"
        max_up:   0.15
        max_down: 0.01
        alpha:    0.10
      phase2:
        interval: "6h"
        max_up:   0.10
        max_down: 0.02
        alpha:    0.12
      phase3:
        interval: "24h"
        max_up:   0.07
        max_down: 0.03
        alpha:    0.15
      steady:
        interval: "84h"
        max_up:   0.05
        max_down: 0.05
        alpha:    0.20

  adapters:
    shield_pep:
      soft_rate_factor: 0.75
      hard_rate_factor: 0.30
      soft_rate_pps: 300
      soft_burst:    800
      hard_rate_pps: 80
      hard_burst:    200
      cooldown:      "5s"
