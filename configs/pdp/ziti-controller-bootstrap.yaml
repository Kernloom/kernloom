# PDPConfig — OpenZiti Controller (Bootstrap / Safe Start)
#
# Use during initial learning phase. High triggers, no blocking.
# Switch to ziti-controller.yaml after 'kliq status' shows steady.

apiVersion: kernloom.io/v1alpha1
kind: PDPConfig
metadata:
  name: ziti-controller-bootstrap
  description: "OpenZiti controller — bootstrap phase, tolerant triggers, no blocking"

spec:

  signal_engine:
    pps_trigger:  400.0
    syn_trigger:  120.0
    scan_trigger:  30.0
    weights:
      pps:  0.35
      syn:  0.45
      scan: 0.20
      cap:  3.0

  progressive_enforcement:
    soft_at:       2
    hard_at:       6
    block_at:      999
    up_need:       3
    down_need:     8
    block_min_sev: 0.0
    block_min_dur: "0s"
    min_hold_soft: "30s"
    min_hold_hard: "1m"

  non_compliance:
    at:    12
    drop:  2.0
    sev:   1.5
    reset: 0.30

  graph:
    enabled: true
    mode:    learn
    store:   /var/lib/kernloom/iq/kliq.db
    promotion:
      min_seen_count: 3
      min_windows:    2
      min_age:        "5m"
      expire_ttl:     "720h"
    freeze:
      max_action:             observe
      allow_block:            false
      min_severity_for_block: 999
    exclude:
      broadcast: true
      loopback:  true

  baseline:
    min_observations:    20
    alpha:               0.10
    alpha_bootstrap:     0.15
    deviation_threshold: 8.0
    min_update_pps:      1.0
    peak_tolerance:      3.0
    peak_decay_half_life: "336h"

  autotune:
    enabled: true
    min_samples: 200
    floors:
      pps:  100.0
      syn:   30.0
      scan:  10.0
    bootstrap:
      window:     "336h"
      k_start:    5.0
      k_final:    4.0
      phase1_end: "48h"
      phase2_end: "120h"
      phase1:
        interval: "1h"
        max_up:   0.15
        max_down: 0.01
        alpha:    0.10
      phase2:
        interval: "6h"
        max_up:   0.10
        max_down: 0.02
        alpha:    0.12
      phase3:
        interval: "24h"
        max_up:   0.07
        max_down: 0.03
        alpha:    0.15
      steady:
        interval: "84h"
        max_up:   0.05
        max_down: 0.05
        alpha:    0.20

  adapters:
    shield_pep:
      soft_rate_factor: 0.75
      hard_rate_factor: 0.30
      soft_rate_pps: 80
      soft_burst:    160
      hard_rate_pps: 30
      hard_burst:    60
      cooldown:      "10s"
